<!DOCTYPE html>
<html>

<head>
  <title>FAQ Accordion</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
    
    .faq {
      border: 1px solid black;
      margin-bottom: 10px;
    }
    
    .question {
      background: #ddd;
      padding: 15px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .answer {
      display: none;
      padding: 15px;
    }
    
    .show {
      display: block;
    }
  </style>
</head>

<body>
  
  <h1>FAQ</h1>
  
  <div class="faq">
    <div class="question">What is JavaScript?</div>
    <div class="answer">
      JavaScript is a programming language used to make websites interactive.
    </div>
  </div>
  
  <div class="faq">
    <div class="question">What is HTML?</div>
    <div class="answer">
      HTML is used to create the structure of a webpage.
    </div>
  </div>
  
  <div class="faq">
    <div class="question">What is CSS?</div>
    <div class="answer">
      CSS is used to style webpages.
    </div>
  </div>
  
  <script>
    let questions = document.querySelectorAll(".question");
    
    questions.forEach(function(question) {
      
      question.addEventListener("click", function() {
        
        let answer = this.nextElementSibling;
        
        answer.classList.toggle("show");
        
      });
      
    });
  </script>
  
</body>

</html>
